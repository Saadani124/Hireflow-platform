<div class="login-page">
<div class="left-panel">
  <a class="logo" style="display: flex; align-items: center;">
    <img src="/logo.ico" alt="HireFlow Logo" style="height: 36px; width: auto; margin-right: 10px;">
    Hire<span>Flow</span></a>

  <div class="panel-content">
    <h2>Start your <em>journey</em></h2>
    <p>Connect with opportunities and grow your freelance career.</p>
  </div>

  <div class="proof">
    <div class="avatars">
      <div class="avatar">A</div>
      <div class="avatar">B</div>
      <div class="avatar">C</div>
    </div>
    <div class="proof-text">
      Trusted by <strong>hundreds of students</strong>
    </div>
  </div>
</div>

<div class="right-panel">
  <div class="form-box">

    <h1>Login</h1>
    <p class="sub">Access your account</p>

    <!-- ERROR / SUCCESS -->
    <div *ngIf="successMessage" class="success-banner">
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="error-banner">
        {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="field-group">
        <label>Email</label>
        <div class="input-wrap">
          <input id="login-email-input" type="text" formControlName="email" placeholder="Email">
          <div *ngIf="(loginForm.get('email')?.touched || submitted) && loginForm.get('email')?.invalid">
            <small *ngIf="loginForm.get('email')?.errors?.['required']">Email required</small>
            <small *ngIf="loginForm.get('email')?.errors?.['email']">Invalid email</small>
          </div>
        </div>
      </div>

      <div class="field-group">
        <div class="row-between">
          <label>Password</label>
        </div>

        <div class="input-wrap">
          <input id="login-password-input" type="password" formControlName="password" placeholder="Password">
          <div *ngIf="(loginForm.get('password')?.touched || submitted) && loginForm.get('password')?.invalid">
            <small>Password must be at least 6 characters</small>
          </div>
        </div>
      </div>

      <button id="login-submit-btn" type="submit" class="submit-btn">
        Login
      </button>

    </form>

    <div class="bottom-link">
      Don’t have an account?
      <a routerLink="/register">Sign up</a>
    </div>

  </div>
</div>
</div>
